# I could not find the common schema for TOML file
# Therefore, I create this file to specify
# the meaning of each fields in flavors

[meta]
version = "0.0.0" # The version of the flavor
name = "Flavor Name"
identifier = "flavorID"
order = 0 # The order of the flavor in the palette
dark = false # Whether the flavor is for dark theme or not.

[colors.colorID]
name = "Your Color Name"
accent = false # Whether the flavor is for accent color or not.
oklch = {light = 0.5, chroma = 0.5, hue = 0}
# In this palette, we choose OKLCH as the color space.
# We'll transpile the color to CSS variables.

# ---------------
#   Variants of Specific Color
# ---------------

[colors.colorID.shades.50]
accent = false
oklch = {light = 0.5, chroma = 0.5, hue = 0}

[colors.colorID.shades.100]
accent = false
oklch = {light = 0.5, chroma = 0.5, hue = 0}

[colors.colorID.shades.200]
accent = false
oklch = {light = 0.6, chroma = 0.5, hue = 0}

[colors.colorID.shades.300]
accent = false
oklch = {light = 0.7, chroma = 0.5, hue = 0}

[colors.colorID.shades.400]
accent = false
oklch = {light = 0.8, chroma = 0.5, hue = 0}

[colors.colorID.shades.500]
accent = false
oklch = {light = 0.9, chroma = 0.5, hue = 0}

[colors.colorID.shades.600]
accent = false
oklch = {light = 1.0, chroma = 0.5, hue = 0}

[colors.colorID.shades.700]
accent = false
