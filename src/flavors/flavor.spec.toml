oklch = {light = 0.5, chroma = 0.5, hue = 0}

# ---------------
#   Ansi Colors
# ---------------

# --- Normal Colors: 0-7 ---

[colors.colorID.ansi.0]
name = "Black"
description = "Terminal background or the deepest base level for high-contrast UI components."
oklch = { light = 0.05, chroma = 0.05, hue = 0 }

[colors.colorID.ansi.1]
name = "Red"
description = "Critical errors, system interruptions, or deletions in version control systems."
oklch = { light = 0.1, chroma = 0.1, hue = 0 }

[colors.colorID.ansi.2]
name = "Green"
description = "Successful operations, healthy status indicators, or additions in version control."
oklch = { light = 0.65, chroma = 0.15, hue = 145 }

[colors.colorID.ansi.3]
name = "Yellow"
description = "System warnings, class attributes, or constants that require developer attention."
oklch = { light = 0.75, chroma = 0.12, hue = 85 }

[colors.colorID.ansi.4]
name = "Blue"
description = "Primary directory paths, core language keywords, or main library identifiers."
oklch = { light = 0.6, chroma = 0.14, hue = 250 }

[colors.colorID.ansi.5]
name = "Magenta"
description = "Built-in shell commands, type definitions, or specialized syntax markers."
oklch = { light = 0.62, chroma = 0.18, hue = 310 }

[colors.colorID.ansi.6]
name = "Cyan"
description = "Hyperlinks, regular expression tokens, or interactive shell prompts."
oklch = { light = 0.68, chroma = 0.1, hue = 190 }

[colors.colorID.ansi.7]
name = "White"
description = "Standard terminal foreground text providing neutral readability across various backgrounds."
oklch = { light = 0.85, chroma = 0.02, hue = 250 }

# --- Bright Colors: 8-15 ---

[colors.colorID.ansi.8]
name = "Bright Black"
